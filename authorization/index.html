<!DOCTYPE html>
<html>
<head>
    <title>Redirecting</title>
    <script>
        // 获取浏览器语言
        var userLang = navigator.language || navigator.userLanguage;
        userLang = userLang.toLowerCase();
        
        // 确定重定向目标
        var targetUrl;
        if (userLang.indexOf('zh') !== -1) {
            // 中文用户
            targetUrl = '/cn/';
        } else if (userLang.indexOf('es') === 0) {
            // Spanish users
            targetUrl = '/es/';
        } else {
            // 默认英文
            targetUrl = '/en/';
        }
        
        // 执行重定向
        window.location.href = targetUrl;
    </script>
    <meta http-equiv="refresh" content="1; URL='/en/'" />
</head>
<body>
    <p>Redirecting. If you are not redirected automatically, please choose your language:</p>
    <p>正在跳转，如果没有自动跳转，请选择您的语言：</p>
    <ul>
        <li><a href="/en/">English</a></li>
        <li><a href="/cn/">中文</a></li>
        <li><a href="/es/">Español</a></li>
    </ul>
</body>
</html>
